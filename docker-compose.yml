services:
  nginx:
    image: nginx:alpine
    environment:
      DOMAIN: soksak.test
      SSL_DOMAINS: soksak.test,soksak-api.test
    volumes:
      - ./var/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./var/certs:/etc/nginx/certs:ro
    depends_on:
      server:
        condition: service_healthy
      ui:
        condition: service_started

  server:
    image: golang:1.25
    working_dir: /app
    command: go run ./cmd/soksak-server
    environment:
      DOMAIN: soksak-api.test
      PORT: "3200"
      DATABASE_URL: postgres://soksak:soksak@postgres:5432/soksak?sslmode=disable
    volumes:
      - ./server:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ui:
    image: node:24
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    environment:
      DOMAIN: soksak.test
      PORT: "5173"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules

  postgres:
    image: postgres:17-alpine
    environment:
      DOMAIN: soksak-db.test
      POSTGRES_USER: soksak
      POSTGRES_PASSWORD: soksak
      POSTGRES_DB: soksak
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  ui_node_modules:
