events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ui_backend {
        server ui:5173;
    }

    upstream api_backend {
        server server:3200;
    }

    server {
        listen 443 ssl;
        server_name abyss-view.test;

        ssl_certificate     /etc/nginx/certs/abyss-view.test.crt;
        ssl_certificate_key /etc/nginx/certs/abyss-view.test.key;

        location / {
            proxy_pass http://ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    server {
        listen 443 ssl;
        server_name abyss-api.test;

        ssl_certificate     /etc/nginx/certs/abyss-api.test.crt;
        ssl_certificate_key /etc/nginx/certs/abyss-api.test.key;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
